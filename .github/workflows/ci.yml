name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: render preview images
    runs-on: ubuntu-latest
    # Switch to the upstream openscad/openscad Docker image (st-43l).
    # The AppImage path was a documented bad fit for Ubuntu 24.04
    # runners (openscad/openscad #5736, #5903) — each fix surfaced
    # the next missing host dep (apprun-hooks, libEGL, libGL, ...).
    # The Docker image bundles EGL + Qt + everything else by design;
    # it's OpenSCAD's recommended CI pattern.
    #
    # Tag pin: dev.2025-09-06. We previously pinned the snapshot
    # 2025.06.12.ai25773 (st-fgp) to get the CGAL/topology fixes that
    # made the 3 stale STL exports watertight. There is NO Docker tag
    # dated June 2025 — the published dev tags jump from 2025-05-19
    # straight to 2025-09-06 (bookworm/trixie families start that
    # same week). dev.2025-09-06 is the first dated tag AFTER our
    # AppImage pin and the closest dev-lineage match.
    container:
      image: openscad/openscad:dev.2025-09-06
    timeout-minutes: 10
    permissions:
      contents: write
      # dorny/paths-filter calls listFiles on the PR to decide whether
      # models/skills/render scripts changed; without pull-requests:read
      # the API call fails with "Resource not accessible by integration".
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch itself (not the merge commit) so the
          # commit-back step can push straight back to it.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter paths (PRs only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            render:
              - 'models/**'
              - '.claude/skills/scad-render/**'
              - '.claude/skills/_lib/**'
              - 'scripts/render-all.py'
              - 'scripts/vendor-libs.sh'
              - 'libs/README.md'

      - name: openscad --version smoke
        # First thing in the job: surface a container-image mismatch
        # immediately. Acceptance gate for st-43l — must print the
        # pinned tag's version cleanly with no source/library errors.
        run: openscad --version

      - name: Install python deps for measure + invariants
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        # The openscad/openscad image is Debian-based but minimal —
        # bundle only what openscad itself needs. measure.py +
        # invariants need numpy, PIL, and trimesh; we also pull
        # pytest for the invariant core unit test step. `git` is
        # required by scripts/vendor-libs.sh (next step) to clone
        # BOSL2 etc.; the minimal openscad image doesn't ship it.
        #
        # apt-get is preferred (deb-packaged wheels are pre-built);
        # fall back to pip with --break-system-packages if the apt
        # package isn't available in this base.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git
          apt-get install -y --no-install-recommends \
            python3-numpy python3-pil python3-trimesh python3-pytest \
            || python3 -m pip install --break-system-packages \
                 numpy pillow trimesh pytest

      - name: Vendor SCAD libraries
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        run: bash scripts/vendor-libs.sh

      - name: Render all models
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        run: python3 scripts/render-all.py

      - name: Export STLs + invariants
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        # The export job produces exports/<stem>.stl which the invariant
        # driver then analyzes. Either step failing is a CI failure —
        # don't keep building on a broken geometry.
        run: |
          python3 scripts/export-all.py
          python3 scripts/check-invariants-all.py

      - name: Invariant core unit tests
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        run: python3 -m pytest scripts/invariants/ -v

      - name: Commit regenerated renders (PRs)
        if: github.event_name == 'pull_request' && steps.filter.outputs.render == 'true'
        # PR_HEAD_REF comes from github.event.pull_request.head.ref, which is
        # attacker-controllable (fork branch names). Keep it in env and only
        # pass through `git push "$PR_HEAD_REF"` — never interpolate directly
        # into a shell line.
        #
        # Container note (st-43l): the openscad/openscad image runs the
        # step as root while actions/checkout populated the workspace as
        # the runner user, so git refuses operations with "dubious
        # ownership" until we mark the workspace safe. The image's base
        # apt set may not include git; install it if missing.
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          command -v git >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends git; }
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add renders/
          if git diff --cached --quiet; then
            echo "No render changes to commit."
          else
            git commit -m "ci: regenerate model thumbnails"
            git push origin "HEAD:$PR_HEAD_REF"
          fi

      - name: Commit regenerated renders (main)
        if: github.event_name == 'push'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          command -v git >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends git; }
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add renders/
          if git diff --cached --quiet; then
            echo "No render changes to commit."
          else
            git commit -m "ci: regenerate model thumbnails"
            git push origin "HEAD:$BRANCH"
          fi

  unit:
    name: unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: e2e tests (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # SCAD libraries (BOSL2, QuackWorks) are vendored by the `prebuild`
      # npm hook — scripts/vendor-libs.sh runs automatically as part of
      # `npm run build` below.
      - name: Build Next.js
        run: npm run build

      - name: Run Playwright (prod server)
        env:
          CI: "1"
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
