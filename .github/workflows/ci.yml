name: ci

# pst-2sb: "render preview images", "unit tests (vitest)", and
# "e2e tests (playwright)" are required status checks on main, and
# PRs merge via auto-merge — a required check that never reports
# hangs the merge forever. So this workflow must run on EVERY PR: do
# not add a workflow-level `paths:` filter here. Cheap skipping is
# handled inside the render job (paths-filter step), which still
# reports a conclusion when it skips the heavy steps.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: render preview images
    runs-on: ubuntu-latest
    # Engine architecture (st-mb1): the container image supplies the
    # runtime environment (EGL + Qt + GL libs — the deps that made bare
    # AppImage-on-runner a bad fit, openscad/openscad #5736, #5903; see
    # st-43l), but its bundled openscad is NOT the engine we render
    # with. The "Install pinned OpenSCAD engine" step below downloads
    # the 2025.06.12.ai25773 AppImage (the st-fgp local pin), extracts
    # it (no FUSE in containers), and shadows the container binary.
    #
    # Why: dev.2025-09-06 was the closest available Docker tag to the
    # June 2025 pin (published dev tags jump 2025-05-19 → 2025-09-06),
    # but its engine exports non-watertight geometry for all 5
    # openGrid-snap models that 2025.06.12.ai25773 exports watertight
    # from identical sources (st-mb1). Same-engine-everywhere beats
    # closest-tag roulette, so the tag now only needs to provide a
    # compatible library environment — do NOT expect this image's own
    # `openscad` to be what renders below.
    container:
      image: openscad/openscad:dev.2025-09-06
    # 40 min: the pinned 2025.06 engine evaluates geometry via CGAL
    # (the dev.2025-09-06 container build that fit in 10 min appears
    # to default to the much faster Manifold backend — but that's the
    # same build that exports non-watertight geometry, st-mb1). Real
    # timings @56ded18: setup+engine install ~2.5 min, render-all
    # 18/18 models ~7 min, exports were cut off at the old 10-min
    # mark ~38s in; local container timings put the full export set
    # around 15 min. Correct-but-slower wins over fast-but-broken.
    timeout-minutes: 40
    permissions:
      contents: write
      # dorny/paths-filter calls listFiles on the PR to decide whether
      # models/skills/render scripts changed; without pull-requests:read
      # the API call fails with "Resource not accessible by integration".
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch itself (not the merge commit) so the
          # commit-back step can push straight back to it.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git for paths-filter
        # st-yzo: dorny/paths-filter@v3 shells out to `git`, but the
        # openscad/openscad container is minimal and git only gets
        # apt-installed later in the python-deps step — so the next
        # step fails with "Unable to locate executable file: git".
        # ca-certificates is needed for any HTTPS git op downstream;
        # bundle both here so paths-filter and any subsequent git
        # work both succeed.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git

      - name: Filter paths
        id: filter
        # st-a50: smart-render is an OPTIMIZATION, not a hard
        # dependency. paths-filter shells out to git operations that
        # still hit container/.git incompatibility (after st-yzo
        # installed git itself), so let the step fail soft — the
        # downstream gates fall back to "render everything" when
        # steps.filter.outcome == 'failure'. Proper redesign (run
        # paths-filter in a separate non-container job) is filed as
        # the st-2nv follow-up.
        continue-on-error: true
        uses: dorny/paths-filter@v3
        with:
          # st-mrt: also surface the specific changed models/libs
          # files so render-all + export-all can short-circuit to
          # the touched subset. `list-files: shell` makes
          # ${{ steps.filter.outputs.models_and_libs_files }} a
          # whitespace-separated path list.
          list-files: shell
          filters: |
            render:
              - 'models/**'
              - '.claude/skills/scad-render/**'
              - '.claude/skills/_lib/**'
              - 'scripts/render-all.py'
              - 'scripts/vendor-libs.sh'
              - 'libs/README.md'
            models_and_libs:
              - 'models/*.scad'
              - 'libs/**'

      - name: Install pinned OpenSCAD engine
        # st-mb1: replace the container's openscad with the exact
        # engine pinned locally (st-fgp): snapshot 2025.06.12.ai25773.
        # The container's dev.2025-09-06 build exports non-watertight
        # STLs for all 5 openGrid-snap models; this snapshot exports
        # them watertight from identical sources (verified in this
        # exact image, 2026-07-10).
        #
        # Hosting: files.openscad.org/snapshots/ retention already
        # dropped this build, so the AppImage is preserved as a release
        # asset on THIS repo (tag openscad-2025.06.12.ai25773) and
        # sha256-pinned here. Containers have no FUSE, so extract the
        # AppImage instead of running it directly; libgpg-error0 is the
        # one shared lib the AppImage needs that the image lacks. The
        # wrapper overwrites /usr/local/bin/openscad (the container
        # binary), so every later `openscad` resolves to the pin.
        env:
          APPIMAGE_URL: https://github.com/SeanOC/stuff/releases/download/openscad-2025.06.12.ai25773/OpenSCAD-2025.06.12.ai25773-x86_64.AppImage
          APPIMAGE_SHA256: cfebdf98c8545ebfcee889b75626d7c0aa5235e3e3a09aea028ee26b3c7de1fc
        run: |
          apt-get install -y --no-install-recommends curl libgpg-error0
          curl -fsSL --retry 3 -o /opt/openscad.AppImage "$APPIMAGE_URL"
          echo "$APPIMAGE_SHA256  /opt/openscad.AppImage" | sha256sum -c -
          chmod +x /opt/openscad.AppImage
          (cd /opt && ./openscad.AppImage --appimage-extract >/dev/null)
          printf '#!/bin/sh\nexec /opt/squashfs-root/AppRun "$@"\n' > /usr/local/bin/openscad
          chmod +x /usr/local/bin/openscad

      - name: openscad --version smoke
        # First thing after engine install: surface an engine mismatch
        # immediately (st-43l, st-mb1) — must print the pinned snapshot
        # version cleanly, proving the AppImage shadow took effect.
        run: |
          openscad --version
          openscad --version 2>&1 | grep -F "2025.06.12.ai25773"

      - name: Smart-render mode summary
        # st-a50: surface in the workflow summary which path the run
        # is taking so future "why did everything re-render?" goes to
        # one place instead of the per-step logs.
        run: |
          if [ "${{ steps.filter.outcome }}" = "failure" ]; then
            echo "smart-render: **fallback render-all** (paths-filter failed)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.filter.outputs.render }}" = "true" ]; then
            echo "smart-render: **filtered** — touched files = \`${{ steps.filter.outputs.models_and_libs_files }}\`" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "smart-render: **push render-all** (push event always renders)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "smart-render: **skipped** (no render-relevant paths changed)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install python deps for measure + invariants
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true' || steps.filter.outcome == 'failure'
        # The openscad/openscad image is Debian-based but minimal —
        # bundle only what openscad itself needs. measure.py +
        # invariants need numpy, PIL, and trimesh; rtree is trimesh's
        # optional ray-query backend required by mesh.contains() in
        # the invariants sidecars (st-3r5). We also pull
        # pytest for the invariant core unit test step. `xvfb`
        # provides the `xvfb-run` wrapper that
        # .claude/skills/_lib/openscad.py invokes to drive openscad
        # headless; `xauth` is required by `xvfb-run -a` for the
        # auth-cookie dance. (git + ca-certificates are installed
        # earlier for paths-filter; st-yzo.)
        #
        # apt-get is preferred (deb-packaged wheels are pre-built);
        # fall back to pip with --break-system-packages if the apt
        # package isn't available in this base.
        run: |
          apt-get install -y --no-install-recommends xauth xvfb
          apt-get install -y --no-install-recommends \
            python3-numpy python3-pil python3-trimesh python3-rtree python3-pytest \
            || python3 -m pip install --break-system-packages \
                 numpy pillow trimesh rtree pytest

      - name: Vendor SCAD libraries
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true' || steps.filter.outcome == 'failure'
        run: bash scripts/vendor-libs.sh

      - name: Render all models
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true' || steps.filter.outcome == 'failure'
        # st-mrt: pass the diff-derived models+libs file list so
        # render-all.py renders only the touched subset (a libs/
        # change still forces a full re-render). Empty string ⇒
        # render-all defaults to ALL models.
        env:
          CHANGED_PATHS: ${{ steps.filter.outputs.models_and_libs_files }}
        run: python3 scripts/render-all.py --changed-paths "$CHANGED_PATHS"

      - name: Export STLs + invariants
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true' || steps.filter.outcome == 'failure'
        # The export job produces exports/<stem>.stl which the invariant
        # driver then analyzes. Either step failing is a CI failure —
        # don't keep building on a broken geometry.
        #
        # st-mrt: same --changed-paths short-circuit as the render
        # step — export-all skips unchanged models, but always runs
        # check-invariants-all on whatever exports/ already contains.
        env:
          CHANGED_PATHS: ${{ steps.filter.outputs.models_and_libs_files }}
        run: |
          python3 scripts/export-all.py --changed-paths "$CHANGED_PATHS"
          python3 scripts/check-invariants-all.py

      - name: Invariant core unit tests
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true' || steps.filter.outcome == 'failure'
        run: python3 -m pytest scripts/invariants/ -v

      - name: Commit regenerated renders (PRs)
        if: github.event_name == 'pull_request' && (steps.filter.outputs.render == 'true' || steps.filter.outcome == 'failure')
        # Best-effort auto-commit (st-491). openscad nightly renders
        # are non-deterministic and main is protected; the proper
        # redesign of this auto-commit-renders pipeline is filed as
        # st-fqc (P3 follow-up). For now, don't let a failure here
        # take down the rest of CI — the substance (renders, exports,
        # invariants, tests) is already green by this point. Keeps
        # st-tre/st-p7r/st-ugc diagnostic + the st-qfv fresh-clone +
        # st-tiu tree-hash skip in place so the next attempt to fix
        # this properly has the scaffolding it needs.
        continue-on-error: true
        # PR_HEAD_REF comes from github.event.pull_request.head.ref, which is
        # attacker-controllable (fork branch names). Keep it in env and only
        # pass through `git push "$PR_HEAD_REF"` — never interpolate directly
        # into a shell line.
        #
        # Workspace-clone pivot (st-qfv): the openscad/openscad container
        # mount of $GITHUB_WORKSPACE has no .git directory (st-ugc
        # diagnostic confirmed). Instead of chasing why actions/checkout
        # didn't materialize one in the container, do a fresh shallow
        # clone in /tmp, copy the regenerated renders/ over, and push
        # from there. Bypasses the workspace-mount mystery entirely.
        # Previous attempts (st-43l, st-dlw, st-ugc): apt-install git
        # in container, cd $GITHUB_WORKSPACE, safe.directory '*'. All
        # correct in isolation but they assumed a .git that doesn't
        # exist in the mount.
        # Token (pst-dm9): pushes made with GITHUB_TOKEN leave the
        # re-triggered pull_request runs stranded in action_required
        # (observed on PR #13) and the push itself cancels the in-flight
        # param sweep via concurrency. Prefer the THUMBNAIL_PUSH_TOKEN
        # repo secret (a PAT with contents:write) so re-triggered runs
        # execute normally; fall back to GITHUB_TOKEN (old behavior)
        # when the secret is absent.
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_TOKEN: ${{ secrets.THUMBNAIL_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          HAS_PUSH_PAT: ${{ secrets.THUMBNAIL_PUSH_TOKEN != '' }}
        run: |
          command -v git >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends git; }
          cd /tmp
          git clone --depth 1 --branch "$PR_HEAD_REF" \
            "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            repo
          cd repo
          # Bring the just-rendered images over from the workspace mount.
          cp -r "$GITHUB_WORKSPACE/renders/." ./renders/
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add renders/
          # Merge-base prune (pst-dm9): renders are engine-deterministic
          # but not cross-machine-deterministic, so an author's local PNG
          # for an UNCHANGED model differs byte-wise from CI's — the old
          # behavior pushed the canonical bytes back on every model PR,
          # a no-op push that cancelled sweeps and stranded checks. If a
          # regenerated PNG byte-matches the PR base (main's canonical
          # copy), drop it from the commit; post-merge the main-flavour
          # step below canonicalizes anyway. Fetch failure falls back to
          # keeping everything (old behavior).
          if [ -n "$PR_BASE_SHA" ] && git fetch --depth 1 origin "$PR_BASE_SHA"; then
            bash "$GITHUB_WORKSPACE/scripts/prune-canonical-renders.sh" "$PR_BASE_SHA"
          else
            echo "WARN: PR base SHA unavailable — keeping every regenerated render"
          fi
          # Content-aware skip (st-tiu): `git diff --cached --quiet`
          # only checks the cached patch, not the resulting tree. A
          # cp -r touches mode/mtime, so the patch is "non-empty" even
          # when every byte of every render is unchanged. Branch
          # protection rejects content-empty pushes. Compare the
          # would-be commit's tree hash to HEAD's tree instead — that's
          # the actual content check.
          new_tree=$(git write-tree)
          head_tree=$(git rev-parse 'HEAD^{tree}')
          if [ "$new_tree" = "$head_tree" ]; then
            echo "Render tree unchanged — no commit needed."
          else
            if [ "$HAS_PUSH_PAT" != "true" ]; then
              echo "NOTE: THUMBNAIL_PUSH_TOKEN secret not set — pushing with GITHUB_TOKEN; re-triggered PR checks may strand in action_required (pst-dm9)."
            fi
            git commit -m "ci: regenerate model thumbnails"
            git push origin "HEAD:$PR_HEAD_REF"
          fi

      - name: Commit regenerated renders (main)
        if: github.event_name == 'push'
        # Best-effort auto-commit (st-491) — see matching comment on
        # the PR-flavour step above. Failure here should not gate
        # prod deploy; redesign tracked in st-fqc.
        continue-on-error: true
        # Workspace-clone pivot (st-qfv) — see matching comment on the
        # PR-flavour step above. Same fresh-clone pattern, branch =
        # github.ref_name (typically `main`). Keeps st-ugc's
        # diagnostic block at the top so the next failure mode
        # surfaces immediately.
        env:
          BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Diagnostics (st-ugc) — keep permanent; cost is two
          # echos, saves a round trip the next time something in
          # this step misbehaves inside the container.
          echo "PWD=$PWD"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "HOME=$HOME"
          ls -la "$GITHUB_WORKSPACE/.git" 2>&1 | head -5 || echo ".git dir missing"
          command -v git >/dev/null 2>&1 || { apt-get update && apt-get install -y --no-install-recommends git; }
          cd /tmp
          git clone --depth 1 --branch "$BRANCH" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            repo
          cd repo
          # Bring the just-rendered images over from the workspace mount.
          cp -r "$GITHUB_WORKSPACE/renders/." ./renders/
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add renders/
          # Content-aware skip (st-tiu) — see matching comment on the
          # PR-flavour step above. Compares write-tree to HEAD's tree
          # to catch byte-identical-but-mode/mtime-touched files that
          # `git diff --cached --quiet` reports as "changes".
          new_tree=$(git write-tree)
          head_tree=$(git rev-parse 'HEAD^{tree}')
          if [ "$new_tree" = "$head_tree" ]; then
            echo "Render tree unchanged — no commit needed."
          else
            git commit -m "ci: regenerate model thumbnails"
            git push origin "HEAD:$BRANCH"
          fi

  unit:
    name: unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: e2e tests (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # SCAD libraries (BOSL2, QuackWorks) are vendored by the `prebuild`
      # npm hook — scripts/vendor-libs.sh runs automatically as part of
      # `npm run build` below.
      - name: Build Next.js
        run: npm run build

      - name: Run Playwright (prod server)
        env:
          CI: "1"
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
