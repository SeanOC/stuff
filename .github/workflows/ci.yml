name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: render preview images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      # dorny/paths-filter calls listFiles on the PR to decide whether
      # models/skills/render scripts changed; without pull-requests:read
      # the API call fails with "Resource not accessible by integration".
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch itself (not the merge commit) so the
          # commit-back step can push straight back to it.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter paths (PRs only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            render:
              - 'models/**'
              - '.claude/skills/scad-render/**'
              - '.claude/skills/_lib/**'
              - 'scripts/render-all.py'
              - 'scripts/vendor-libs.sh'
              - 'libs/README.md'

      - name: Install openscad (pinned snapshot) + xvfb + python deps
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        # Ubuntu 24.04's apt openscad is 2021.01, too old for the
        # gridfinity-rebuilt library (uses 2024+ language features) and
        # for the CGAL-precision behavior our valve / flow-meter mounts
        # rely on (older openscad leaves sealed cavities → STLs fail
        # the watertight check) (st-fgp). Pin the same nightly snapshot
        # the dev environment uses so CI mirrors local results.
        #
        # python3-numpy + python3-pil are required by
        # .claude/skills/_lib/measure.py for hole/feature measurement
        # in scripts/render-all.py (broken since st-dd1 without these).
        #
        # AppImage launcher (st-3e2): the newer snapshot's AppRun
        # script unconditionally sources its qt apprun-hook from
        # $(dirname $0)/apprun-hooks/. A bare symlink at
        # /usr/local/bin/openscad → /opt/openscad/AppRun left $0
        # pointing at /usr/local/bin/openscad, so AppRun looked for
        # /usr/local/bin/apprun-hooks/... and died "No such file or
        # directory" before openscad ever ran. We now install a real
        # wrapper that exec's AppRun by its actual extracted path
        # (so $(dirname $0) resolves to /opt/openscad and the hook
        # lookup hits /opt/openscad/apprun-hooks/), and we drop a
        # no-op stub at that location in case the newer AppImage
        # layout has retired the hook altogether — Qt libs still
        # resolve through the AppDir's standard LD path without it.
        env:
          OPENSCAD_VERSION: "2025.06.12.ai25773"
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-numpy python3-pil
          cd /tmp
          curl -fsSL -o openscad.AppImage \
            "https://files.openscad.org/snapshots/OpenSCAD-${OPENSCAD_VERSION}-x86_64.AppImage"
          chmod +x openscad.AppImage
          ./openscad.AppImage --appimage-extract > /dev/null
          sudo mv squashfs-root /opt/openscad
          # Ensure AppRun's expected qt-hook path exists — stub if missing.
          HOOK_DIR=/opt/openscad/apprun-hooks
          HOOK_SCRIPT="$HOOK_DIR/linuxdeploy-plugin-qt-hook.sh"
          sudo mkdir -p "$HOOK_DIR"
          if [ ! -e "$HOOK_SCRIPT" ]; then
            echo "# st-3e2 no-op stub: hook retired in newer AppImage layout" \
              | sudo tee "$HOOK_SCRIPT" > /dev/null
            sudo chmod +x "$HOOK_SCRIPT"
          fi
          # Install the real wrapper (not a symlink) so AppRun's $0
          # resolves to /opt/openscad/AppRun. printf rather than a
          # heredoc here so YAML-indentation whitespace doesn't end
          # up on the shebang line.
          printf '%s\n' '#!/bin/sh' 'exec /opt/openscad/AppRun "$@"' \
            | sudo tee /usr/local/bin/openscad > /dev/null
          sudo chmod +x /usr/local/bin/openscad
          # Post-install smoke: --version must print the pinned snapshot
          # without sourcing-error noise (st-3e2 acceptance).
          openscad --version

      - name: Vendor SCAD libraries
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        run: bash scripts/vendor-libs.sh

      - name: Render all models
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        run: python3 scripts/render-all.py

      - name: Install trimesh (for export + invariants)
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        # trimesh is pulled in here so we don't inflate the render-only
        # path with it. export.py loads the STL via trimesh to assert
        # watertightness; check-invariants.py extends that with
        # connected-component + per-model sidecar checks (st-cjn).
        run: |
          sudo apt-get install -y python3-trimesh python3-pytest || \
            python3 -m pip install --break-system-packages trimesh pytest

      - name: Export STLs + invariants
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        # The export job produces exports/<stem>.stl which the invariant
        # driver then analyzes. Either step failing is a CI failure —
        # don't keep building on a broken geometry.
        run: |
          python3 scripts/export-all.py
          python3 scripts/check-invariants-all.py

      - name: Invariant core unit tests
        if: github.event_name == 'push' || steps.filter.outputs.render == 'true'
        run: python3 -m pytest scripts/invariants/ -v

      - name: Commit regenerated renders (PRs)
        if: github.event_name == 'pull_request' && steps.filter.outputs.render == 'true'
        # PR_HEAD_REF comes from github.event.pull_request.head.ref, which is
        # attacker-controllable (fork branch names). Keep it in env and only
        # pass through `git push "$PR_HEAD_REF"` — never interpolate directly
        # into a shell line.
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add renders/
          if git diff --cached --quiet; then
            echo "No render changes to commit."
          else
            git commit -m "ci: regenerate model thumbnails"
            git push origin "HEAD:$PR_HEAD_REF"
          fi

      - name: Commit regenerated renders (main)
        if: github.event_name == 'push'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add renders/
          if git diff --cached --quiet; then
            echo "No render changes to commit."
          else
            git commit -m "ci: regenerate model thumbnails"
            git push origin "HEAD:$BRANCH"
          fi

  unit:
    name: unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: e2e tests (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # SCAD libraries (BOSL2, QuackWorks) are vendored by the `prebuild`
      # npm hook — scripts/vendor-libs.sh runs automatically as part of
      # `npm run build` below.
      - name: Build Next.js
        run: npm run build

      - name: Run Playwright (prod server)
        env:
          CI: "1"
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
