# Param-sweep connectivity guard (st-7x7): renders every catalog model
# through the site's real wasm pipeline at the min/mid/max of every
# @param and asserts each result is a watertight mesh with the expected
# number of connected components. Catches param values that shatter a
# model in the preview (wasm engine CSG failures that desktop OpenSCAD
# doesn't reproduce) before they ship.
#
# Separate workflow from ci.yml because it's minutes of wasm rendering —
# path-gated to the inputs that can change render outcomes.
name: param-sweep

on:
  push:
    branches: [main]
    paths:
      - "models/**"
      - "libs/README.md"
      - "lib/wasm/**"
      - "lib/scad-params/**"
      - "tests/sweep/**"
      - "vitest.sweep.config.ts"
      - "scripts/vendor-libs.sh"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "models/**"
      - "libs/README.md"
      - "lib/wasm/**"
      - "lib/scad-params/**"
      - "tests/sweep/**"
      - "vitest.sweep.config.ts"
      - "scripts/vendor-libs.sh"
      - "package-lock.json"

concurrency:
  group: param-sweep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sweep:
    name: wasm param sweep
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Vendor SCAD libraries
        run: bash scripts/vendor-libs.sh
      - name: Run param sweep
        run: npm run test:sweep
