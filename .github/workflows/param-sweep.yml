# Param-sweep connectivity guard (st-7x7): renders catalog models
# through the site's real wasm pipeline at the min/mid/max of every
# @param and asserts each result is a watertight mesh with the expected
# number of connected components. Catches param values that shatter a
# model in the preview (wasm engine CSG failures that desktop OpenSCAD
# doesn't reproduce) before they ship.
#
# Separate workflow from ci.yml because it's minutes of wasm rendering.
#
# Scope + sharding (pst-776): a `select` job maps the PR's changed
# files to the per-model sweep tests actually affected
# (scripts/select-sweep-tests.py — full sweep when a sweep-global
# input changed, skip-all when nothing sweep-relevant changed) and
# splits them into cost-balanced shards run as parallel matrix jobs.
# Coverage guard: pushes to main and workflow_dispatch always run the
# FULL sweep, so a selective PR can never permanently mask a
# param-extreme regression in an untouched model — it surfaces on the
# merge commit's run. See docs/ci.md.
#
# Always-reporting (pst-2sb): the pull_request trigger deliberately
# has NO paths filter. "wasm param sweep" (the gate job below) is a
# required status check, and a required check that never reports
# hangs auto-merge forever. Instead of workflow-level path gating,
# every PR runs the cheap `select` job (~20s) and the script's skip
# mode makes sweep-irrelevant PRs pass in seconds. The push trigger
# keeps its paths filter — main pushes aren't gated by required
# checks, so a docs-only merge shouldn't pay a full sweep.
name: param-sweep

on:
  push:
    branches: [main]
    paths:
      - "models/**"
      - "libs/README.md"
      - "lib/wasm/**"
      - "lib/scad-params/**"
      - "tests/sweep/**"
      - "vitest.sweep.config.ts"
      - "scripts/vendor-libs.sh"
      - "scripts/select-sweep-tests.py"
      - "package-lock.json"
      - ".github/workflows/param-sweep.yml"
  pull_request:
    branches: [main]
  # Manual full-sweep escape hatch (also the way to re-fuzz: the wasm
  # engine's CGAL failures are randomized, so an extra full pass has
  # value even on an unchanged tree).
  workflow_dispatch:

concurrency:
  group: param-sweep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select:
    name: select sweep scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # dorny/paths-filter lists the PR's files via the API.
      pull-requests: read
    outputs:
      mode: ${{ steps.select.outputs.mode }}
      shard_total: ${{ steps.select.outputs.shard_total }}
      shard_matrix: ${{ steps.select.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: List changed files
        id: filter
        if: github.event_name == 'pull_request'
        # Fail-soft like ci.yml's filter (st-a50): on filter failure
        # the change list stays empty and the script widens to a full
        # sweep — an optimization miss, never a coverage miss.
        continue-on-error: true
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            any:
              - "**"
      - name: Decide scope and shards
        id: select
        # Empty CHANGED_PATHS (push / dispatch / filter failure) ⇒
        # full sweep. The script emits mode, shard_total, and a
        # shard_matrix of {id, files} objects; every path in `files`
        # is sanitized and existence-checked, which is what makes the
        # sweep job's `run:` interpolation below safe on fork PRs.
        env:
          CHANGED_PATHS: ${{ steps.filter.outputs.any_files }}
        run: python3 scripts/select-sweep-tests.py --changed-paths "$CHANGED_PATHS"

  sweep:
    name: wasm param sweep (shard ${{ matrix.shard.id }}/${{ needs.select.outputs.shard_total }})
    needs: select
    if: needs.select.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # One shard's model failure must not cancel the others — the
      # full failure report across all shards is the point.
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.select.outputs.shard_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Vendor SCAD libraries
        run: bash scripts/vendor-libs.sh
      - name: Run param sweep shard
        # matrix.shard.files is machine-generated by
        # scripts/select-sweep-tests.py from regex-sanitized,
        # existence-checked repo paths — safe to interpolate.
        run: npm run test:sweep -- ${{ matrix.shard.files }}

  gate:
    # pst-2sb: the single stable-named check that branch protection
    # requires. The shard jobs' names vary with the matrix ("wasm
    # param sweep (shard 1/3)"), so they can't be required contexts
    # themselves; this job reduces them to one always-reporting
    # conclusion — success when every selected shard passed or when
    # select decided nothing sweep-relevant changed (skip), failure
    # otherwise. `if: always()` so a shard failure can't leave the
    # gate unreported.
    name: wasm param sweep
    needs: [select, sweep]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Reduce shard results to one conclusion
        env:
          SELECT_RESULT: ${{ needs.select.result }}
          SWEEP_RESULT: ${{ needs.sweep.result }}
          MODE: ${{ needs.select.outputs.mode }}
        run: |
          echo "select=$SELECT_RESULT mode=$MODE sweep=$SWEEP_RESULT"
          if [ "$SELECT_RESULT" != "success" ]; then
            echo "select job did not succeed — sweep scope is untrusted" >&2
            exit 1
          fi
          case "$SWEEP_RESULT" in
            success)
              exit 0 ;;
            skipped)
              if [ "$MODE" = "skip" ]; then
                echo "nothing sweep-relevant changed — passing without a sweep"
                exit 0
              fi
              echo "sweep was skipped but select mode was '$MODE', not 'skip'" >&2
              exit 1 ;;
            *)
              echo "sweep result: $SWEEP_RESULT" >&2
              exit 1 ;;
          esac
