# Pilot worker pool (st-qr2): scalable on-demand workers for the stuff rig.
# min 0 / max 3 (raised from pilot-spec 2 by operator request, 2026-07-14). Each session gets an isolated git
# worktree of the rig repo. Merge is PR-only — see prompt.template.md.
scope = "rig"
dir = "stuff"
provider = "claude"
min_active_sessions = 0
max_active_sessions = 3
idle_timeout = "30m"
# Per-agent reasoning effort (co-8h7b precondition): the claude provider's
# builtin default is effort=max; override per agent here rather than
# inheriting it implicitly. Valid: low|medium|high|xhigh|max.
option_defaults = { effort = "max" }
work_dir = ".gc/worktrees/stuff/worker/{{.Agent}}"
pre_start = ["{{.CityRoot}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}} --sync"]
nudge = "Check your hook (gc hook --claim --json), then work the claimed bead per your prompt. PR-only merges."
